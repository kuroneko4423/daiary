name: daiary
description: "AI-powered photo diary app with hashtag and caption generation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  supabase_flutter: ^2.8.4
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  flutter_secure_storage: ^9.2.4
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  intl: ^0.19.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  mockito: ^5.4.5

flutter:
  uses-material-design: true
