name: daiary_online
description: "dAIary Online - Cloud-powered photo diary with AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  daiary_shared:
    path: ../../packages/shared
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.8.4
  dio: ^5.7.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.4
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5

flutter:
  uses-material-design: true
