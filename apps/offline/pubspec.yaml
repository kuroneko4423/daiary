name: daiary_offline
description: "dAIary Offline - On-device AI photo diary"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  daiary_shared:
    path: ../../packages/shared
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  image: ^4.3.0
  exif: ^3.3.0
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
