name: daiary_offline
description: "AI-powered photo diary app - Offline version with on-device AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  share_plus: ^10.1.4
  intl: ^0.19.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  image: ^4.3.0
  shared_preferences: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  mockito: ^5.4.5

flutter:
  uses-material-design: true
